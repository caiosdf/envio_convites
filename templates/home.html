<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f7f3f0, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #c59d5f;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #b68c4e;
        }

        .erro {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>Bem-vindo</h1>
        <div class="subtitle">Informe seu telefone para continuar</div>

        <form onsubmit="irParaFormulario(event)">
            <input 
                type="tel" 
                id="telefone" 
                placeholder="(21) 99999-9999"
                required
            >

            <button type="submit">Continuar</button>
        </form>

        <div id="erro" class="erro">
            Telefone inválido
        </div>

    </div>

<script>
function limparTelefone(tel) {
    return tel.replace(/\D/g, '');
}

function irParaFormulario(event) {
    event.preventDefault();

    let telefone = document.getElementById("telefone").value;
    telefone = limparTelefone(telefone);

    if (telefone.length < 10) {
        document.getElementById("erro").style.display = "block";
        return;
    }

    window.location.href = `/form?telefone=${telefone}`;
}
</script>

</body>
</html>
